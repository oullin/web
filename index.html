<!doctype html>
<html lang="en" class="scroll-smooth">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" href="/brand/logo-primary-mark-light.svg" type="image/svg+xml" />
		<link rel="shortcut icon" href="/brand/logo-primary-mark-light.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="/brand/logo-touch.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

			name="description"
			content="Oullin is a boutique software engineering and architecture consultancy focused on highly available software, digital transformation in the AI era, and complex systems in regulated and high-trust environments."

		/>
		<meta name="robots" content="index,follow" />
		<meta name="theme-color" content="#ffffff" />
		<meta name="author" content="Oullin" />
		<link rel="canonical" href="https://oullin.io/" />
		<link rel="alternate" href="https://oullin.io/" hreflang="en" />
		<link rel="alternate" href="https://oullin.io/" hreflang="x-default" />
		<title>Oullin</title>
		<style>
			html {
				background: #f6f6fd;
			}

			html.dark {
				background: #06080d;
				color-scheme: dark;
			}
		</style>

		<!-- Open Graph -->
		<meta property="og:title" content="Oullin" />
		<meta
			property="og:description"
			content="Oullin is a boutique software engineering and architecture consultancy focused on highly available software, digital transformation in the AI era, and complex systems in regulated and high-trust environments."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://oullin.io/" />
		<meta property="og:image" content="https://oullin.io/images/profile/about-seo.png" />
		<meta property="og:image:alt" content="Oullin brand preview" />
		<meta property="og:site_name" content="Oullin" />
		<meta property="og:locale" content="en_US" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Oullin" />
		<meta
			name="twitter:description"
			content="Oullin is a boutique software engineering and architecture consultancy focused on highly available software, digital transformation in the AI era, and complex systems in regulated and high-trust environments."
		/>
		<meta name="twitter:image" content="https://oullin.io/images/profile/about-seo.png" />
		<meta name="twitter:image:alt" content="Oullin brand preview" />
		<meta name="twitter:creator" content="@oullin" />
		<meta name="twitter:site" content="@oullin" />

		<!-- Structured Data for AI and crawlers -->
		<script id="seo-jsonld" type="application/ld+json">
			[
				{
					"@context": "https://schema.org",
					"@type": "WebSite",
					"url": "https://oullin.io/",
					"name": "Oullin",
					"description": "Oullin is a boutique software engineering and architecture consultancy focused on highly available software, digital transformation in the AI era, and complex systems in regulated and high-trust environments."
				},
				{
					"@context": "https://schema.org",
					"@type": "Organization",
					"name": "Oullin",
					"url": "https://oullin.io/",
					"logo": "https://oullin.io/images/profile/about-seo.png",
					"image": "https://oullin.io/images/profile/about-seo.png",
					"description": "Boutique software engineering and architecture consultancy focused on highly available software, digital transformation in the AI era, and complex systems in regulated and high-trust environments.",
					"sameAs": ["https://github.com/oullin"]
				}
			]
		</script>

		<script>
			if (localStorage.getItem('dark-mode') === 'true') {
				document.documentElement.classList.add('dark');
			}
		</script>
	</head>
	<body class="theme">
		<div id="app"></div>
		<script type="module" src="/src/main.ts"></script>
	</body>
